server:
  port: 8081
spring:
  application:
    name: ingestion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinel?currentSchema=ingestion
    username: sentinel
    password: sentinel
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: ingestion
  data:
    redis:
      host: localhost
      port: 6379
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
